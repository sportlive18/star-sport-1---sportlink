<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sportlink</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    text-align: center;
}

header {
    padding: 20px;
}

h1 {
    font-size: 40px;
    margin: 10px 0;
    color: #00ffcc;
}

h2 {
    font-size: 20px;
    color: #ffd700;
}

.player {
    margin: 20px auto;
    width: 95%;
    max-width: 900px;
    height: 500px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.whatsapp-btn {
    display: inline-block;
    margin: 20px;
    padding: 12px 25px;
    background: #25D366;
    color: white;
    text-decoration: none;
    font-size: 18px;
    border-radius: 30px;
    transition: 0.3s;
}

.whatsapp-btn:hover {
    background: #1ebe5d;
}

footer {
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.8;
}
</style>

</head>

<body>

<header>
    <h1>Sportlink</h1>
    <h2>Willow Cricbuzz</h2>
</header>

<div class="player">
    <iframe src="https://sportlink-hindi-10.pages.dev/" allowfullscreen></iframe>
</div>

<a class="whatsapp-btn" href="https://whatsapp.com/channel/0029VbC2oQsC6ZvmwpR3v73v" target="_blank">
    Join WhatsApp Channel
</a>

<footer>
    © 2026 Sportlink | Live Cricket Streaming
</footer>

</body>
</html>
